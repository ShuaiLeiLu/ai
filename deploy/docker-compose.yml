services:
  api:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: cyber-invest-api
    restart: unless-stopped
    env_file:
      - ../server/.env
    ports:
      - "8000:8000"

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    container_name: cyber-invest-web
    restart: unless-stopped
    environment:
      INTERNAL_API_BASE_URL: http://api:8000/api/v1
      NEXT_PUBLIC_APP_NAME: 赛博投研
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      NEXT_PUBLIC_SSE_BASE_URL: /api/v1
    depends_on:
      - api
    ports:
      - "3000:3000"
