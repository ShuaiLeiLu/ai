services:
  api:
    image: deploy-api:latest
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: ai-api
    restart: unless-stopped
    env_file:
      - .env.production
    networks:
      - deploy_default
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    image: deploy-web:latest
    build:
      context: ..
      dockerfile: web/Dockerfile
    container_name: ai-web
    restart: unless-stopped
    environment:
      INTERNAL_API_BASE_URL: http://api:8000/api/v1
      NEXT_PUBLIC_APP_NAME: 赛博投研
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      NEXT_PUBLIC_SSE_BASE_URL: /api/v1
    depends_on:
      - api
    networks:
      - deploy_default
    ports:
      - "3000:3000"

networks:
  deploy_default:
    external: true
