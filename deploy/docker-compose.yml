services:
  # ── 基础设施 ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cyber-invest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cyber_invest}
      POSTGRES_USER: ${POSTGRES_USER:-sub2api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-78e6363872039268b75fc4e1da5b2af5108f7f12530008d7}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sub2api}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cyber-invest-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cyber-invest-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cyberinvest}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-5a5f5b116bf24072bf6ea93fec4f9f95}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  # ── 后端 API ──
  api:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: cyber-invest-api
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  # ── Celery Worker ──
  worker:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: cyber-invest-worker
    restart: unless-stopped
    env_file:
      - .env.production
    command: ["celery", "-A", "app.core.celery_app.celery_app", "worker", "--workdir", "server", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat ──
  beat:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: cyber-invest-beat
    restart: unless-stopped
    env_file:
      - .env.production
    command: ["celery", "-A", "app.core.celery_app.celery_app", "beat", "--workdir", "server", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── 前端 ──
  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    container_name: cyber-invest-web
    restart: unless-stopped
    environment:
      INTERNAL_API_BASE_URL: http://api:8000/api/v1
      NEXT_PUBLIC_APP_NAME: 赛博投研
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      NEXT_PUBLIC_SSE_BASE_URL: /api/v1
    depends_on:
      - api
    ports:
      - "3000:3000"

  # ── Nginx 反向代理 ──
  nginx:
    image: nginx:alpine
    container_name: cyber-invest-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

volumes:
  postgres-data:
  redis-data:
  minio-data:
